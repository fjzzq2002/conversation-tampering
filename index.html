<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Conversation Tampering — transcript viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --fg:#222; --bg:#fafafa; --muted:#777; --line:#ddd;
    --user:#eef2f7; --assistant:#fff;
    --inject:#b45309;
    --mimic:#fee2e2; --self:#a78bfa; --system:#60a5fa; --both:#f472b6;
    --mono: ui-monospace, "JetBrains Mono", "Cascadia Code", Menlo, monospace;
  }
  body {
    margin:0; font:14px/1.5 system-ui, sans-serif; color:var(--fg); background:var(--bg);
  }
  header {
    padding:14px 18px; border-bottom:1px solid var(--line); background:#fff;
    position:sticky; top:0; z-index:10;
    display:flex; gap:18px; align-items:center; flex-wrap:wrap;
  }
  header input[type=text]{ font:inherit; padding:5px 8px; min-width:280px; border:1px solid var(--line); border-radius:4px; }
  header select{ font:inherit; padding:5px 6px; }
  header h1{ margin:0; font-size:15px; font-weight:600; }
  header .meta{ color:var(--muted); font-size:13px; }
  main{ padding:18px; max-width:980px; margin:0 auto; }

  /* index browser */
  .browser table{ border-collapse:collapse; width:100%; font-size:13px; }
  .browser th, .browser td{ text-align:left; padding:5px 8px; border-bottom:1px solid var(--line); }
  .browser td.idx{ font-family:var(--mono); }
  .browser tr:hover{ background:#fff7e6; }
  .browser a{ color:#1d4ed8; text-decoration:none; }
  .browser .actions{ margin: 8px 0 14px; display:flex; gap:8px; }
  .browser .actions button{ font:inherit; padding:4px 10px; border:1px solid var(--line); background:#fff; cursor:pointer; border-radius:4px; }
  .browser .actions button:hover{ background:#f3f4f6; }
  .browser .model-group{ background:#fff; border:1px solid var(--line); border-radius:6px; margin-bottom:10px; padding:0; }
  .browser .model-group > summary{ padding:10px 14px; cursor:pointer; font-size:14px; user-select:none; }
  .browser .model-group[open] > summary{ border-bottom:1px solid var(--line); }
  .browser .setup-group{ padding:0 14px 8px; border-top:1px dashed var(--line); }
  .browser .setup-group:first-of-type{ border-top:none; padding-top:8px; }
  .browser .setup-group > summary{ padding:6px 0; cursor:pointer; font-size:13px; color:#374151; user-select:none; }
  .browser .count{ color:var(--muted); font-weight:400; font-size:12px; }
  .browser .inner-tbl{ width:100%; margin-top:4px; }

  /* run view */
  .runmeta{ background:#fff; border:1px solid var(--line); padding:10px 14px; margin-bottom:14px; border-radius:6px; }
  .runmeta .row{ display:flex; gap:18px; flex-wrap:wrap; font-size:13px; color:var(--muted); }
  .runmeta .row b{ color:var(--fg); }
  .runmeta .index{ font-family:var(--mono); font-weight:600; font-size:15px; color:var(--fg); }

  .turn{
    background:#fff; border:1px solid var(--line); border-radius:6px;
    margin:8px 0; padding:10px 14px; scroll-margin-top:80px;
  }
  .turn.highlighted{ border-color:#f59e0b; box-shadow: 0 0 0 2px #fde68a; }
  .turn.attr-self{   border-left:4px solid var(--self); }
  .turn.attr-system{ border-left:4px solid var(--system); }
  .turn.attr-both{   border-left:4px solid var(--both); }
  .turn-head{
    display:flex; gap:10px; align-items:center; margin-bottom:6px;
    font-size:12px; color:var(--muted); font-family:var(--mono);
  }
  .turn-head .num{ font-weight:700; color:var(--fg); }
  .turn-head .badge{
    border-radius:3px; padding:1px 6px; font-size:11px; color:#fff; text-transform:uppercase;
  }
  .badge.self{   background: var(--self); }
  .badge.system{ background: var(--system); }
  .badge.both{   background: var(--both); }
  .badge.tamp{   background: #d97706; }
  .badge.mimic{  background: #ef4444; }
  .role{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:6px; }
  .body{ white-space:pre-wrap; font-family: ui-sans-serif, system-ui, sans-serif; }
  .body.user{ color:#374151; }
  .body.stored .inject{ color: var(--inject); font-weight:700; }
  details summary{ cursor:pointer; color:#1d4ed8; font-size:12px; }
  .stored-toggle{ margin-top:6px; }
  .copy{ float:right; font-size:11px; color:#1d4ed8; cursor:pointer; }
  .copy:hover{ text-decoration:underline; }
  .fwd-link{ color:var(--muted); font-size:12px; }
  footer{ color:var(--muted); padding:18px; text-align:center; font-size:12px; }
</style>
</head>
<body>

<header>
  <h1>Conversation Tampering — transcripts</h1>
  <span class="meta" id="status"></span>
  <span style="flex:1"></span>
  <input type="text" id="search" placeholder="Filter by index or model..." disabled>
</header>

<main id="content">Loading…</main>

<footer>
  Indexes: <code>model-setup-word-run[-tNN]</code> e.g. <code>op45-pf-l-06-t30</code>
  · <span id="footer-meta"></span>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const idParam = params.get('id');
const dataRoot = 'data/';

const SETUP_LABEL = {
  'nothinking':'prepend instant',
  'thinking+carry':'prepend thinking',
  'prefill':'prefill',
  'none':'control (no tampering)',
};
const MODEL_LABEL = {
  'opus 4.5':'Opus 4.5','opus 4.6':'Opus 4.6','sonnet 4.5':'Sonnet 4.5','gpt-5.4':'GPT-5.4',
  'olmo32b-Inst':'OLMo-3.1-32B Instruct','olmo32b-DPO':'OLMo-3.1-32B DPO',
  'olmo32b-SFT':'OLMo-3.1-32B SFT','olmo3-7b':'OLMo-3-7B Instruct',
  'olmo32b-Inst-fp8':'OLMo-3.1-32B Instruct (fp8)',
};

function escapeHtml(s){
  return (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlightInjected(stored, inject){
  const e = escapeHtml(stored);
  if (!inject) return e;
  const ie = escapeHtml(inject);
  return e.split(ie).join(`<span class="inject">${ie}</span>`);
}

async function loadJSON(path){
  const r = await fetch(path);
  if (!r.ok) throw new Error(`fetch ${path}: ${r.status}`);
  return r.json();
}

function renderRun(run, jumpTurn){
  const m = run;
  // find the turn whose raw response is the longest, for jump-to-max
  let maxTurn = null, maxLen = -1;
  for (const t of m.turns) {
    const L = (t.raw || '').length;
    if (L > maxLen) { maxLen = L; maxTurn = t.turn; }
  }
  const meta = `
    <div class="runmeta">
      <div class="index">${m.index}
        <span class="copy" style="margin-left:10px" onclick="copyRunLink()">copy permalink</span>
      </div>
      <div class="row">
        <span><b>${MODEL_LABEL[m.model] || m.model}</b></span>
        <span>setup: <b>${SETUP_LABEL[m.setup] || m.setup}</b></span>
        <span>forbidden word: <b>"${m.forbidden_word}"</b></span>
        <span>injected: <b>"${m.inject_token}"</b></span>
        <span>turns: <b>${m.n_turns}</b></span>
      </div>
      <div class="row" style="margin-top:6px">
        <span>mimicry: <b>${m.mimicry_pct}%</b> of turns start with forbidden token</span>
        <span>introspection: <b>${m.introspection_pct}%</b> of turns flagged
          (<span style="color:var(--self)">self ${m.attribution_counts.self||0}</span> ·
           <span style="color:var(--system)">system ${m.attribution_counts.system||0}</span> ·
           <span style="color:var(--both)">both ${m.attribution_counts.both||0}</span>)</span>
        ${m.prompted_v4draft_think !== null ? `<span>prompted introspection score: <b>${m.prompted_v4draft_think}</b></span>` : ''}
      </div>
      <div class="row" style="margin-top:6px">
        <span>max response: <b>${maxLen >= 0 ? maxLen : 0}</b> chars
          ${maxTurn !== null ? `(<a href="#t${maxTurn}" onclick="jumpTurn(${maxTurn});return false;" style="text-decoration:none;color:inherit">turn ${maxTurn}</a>)` : ''}</span>
        <span>mean response: <b>${m.mean_chars ?? '?'}</b> chars</span>
      </div>
    </div>`;

  const turnsHtml = m.turns.map(t => {
    const cls = ['turn'];
    if (t.tampered) cls.push('tampered');
    if (t.mimic_start) cls.push('mimic');
    if (t.attribution && t.attribution !== 'none') cls.push('attr-' + t.attribution);
    if (jumpTurn !== null && t.turn === jumpTurn) cls.push('highlighted');
    const badges = [];
    if (t.tampered) badges.push('<span class="badge tamp">tamper</span>');
    if (t.mimic_start) badges.push('<span class="badge mimic">mimic</span>');
    if (t.attribution && t.attribution !== 'none') badges.push(`<span class="badge ${t.attribution}">introspection-${t.attribution}</span>`);
    const tampered = t.tampered && t.stored !== t.raw;
    const injectKind = m.setup === 'prefill' ? 'prefilled'
                     : (m.setup === 'append' || m.setup === 'insert' || m.setup === 'nothinking' || m.setup === 'thinking+carry' || m.setup === 'thinking') ? 'prepended'
                     : null;
    const asstLabel = tampered && injectKind
      ? `assistant (${injectKind} token in <span style="color:var(--inject);font-weight:700">orange</span>)`
      : 'assistant';
    const asstBody = tampered
      ? highlightInjected(t.stored, m.inject_token)
      : escapeHtml(t.raw);
    return `
      <div class="${cls.join(' ')}" id="t${t.turn}">
        <div class="turn-head">
          <span class="num">turn ${t.turn}</span>
          ${badges.join(' ')}
          <span class="copy" onclick="copyLink(${t.turn})">copy permalink</span>
        </div>
        <div class="role">user</div>
        <div class="body user">${escapeHtml(t.user)}</div>
        <div class="role">${asstLabel}</div>
        <div class="body stored">${asstBody}</div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = meta + turnsHtml;

  if (jumpTurn !== null) {
    setTimeout(() => {
      const el = document.getElementById('t' + jumpTurn);
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 30);
  }
}

function copyLink(turn){
  const id = idParam.split('-t')[0];
  const url = `${window.location.origin}${window.location.pathname}?id=${id}-t${String(turn).padStart(2,'0')}`;
  navigator.clipboard.writeText(url);
}
function copyRunLink(){
  const id = idParam.split('-t')[0];
  const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
  navigator.clipboard.writeText(url);
}
function jumpTurn(turn){
  const el = document.getElementById('t' + turn);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}
window.copyLink = copyLink;
window.copyRunLink = copyRunLink;
window.jumpTurn = jumpTurn;

const MODEL_ORDER = ['opus 4.5','opus 4.6','sonnet 4.5','gpt-5.4',
                     'olmo32b-SFT','olmo32b-DPO','olmo32b-Inst','olmo32b-Inst-fp8','olmo3-7b'];
const SETUP_ORDER = ['prefill','nothinking','thinking+carry','none'];
const WORD_ORDER  = ['assistant','sure','lovely','of course'];
const orderRank = (arr, v) => { const i = arr.indexOf(v); return i < 0 ? 999 : i; };

function defaultSort(a, b){
  return (orderRank(MODEL_ORDER, a.model) - orderRank(MODEL_ORDER, b.model))
      || (orderRank(SETUP_ORDER, a.setup) - orderRank(SETUP_ORDER, b.setup))
      || (orderRank(WORD_ORDER,  a.word)  - orderRank(WORD_ORDER,  b.word))
      || a.index.localeCompare(b.index);
}

let _manifest = null;
function renderBrowser(manifest){
  _manifest = manifest;
  const groupBy = (document.getElementById('group-by')?.value) || 'setup';
  const sessions = manifest.sessions.slice().sort(defaultSort);

  // group: model -> (setup or word) -> rows
  const byModel = new Map();
  for (const s of sessions) {
    if (!byModel.has(s.model)) byModel.set(s.model, new Map());
    const inner = byModel.get(s.model);
    const k = s[groupBy];
    if (!inner.has(k)) inner.set(k, []);
    inner.get(k).push(s);
  }

  const secondCol = groupBy === 'setup' ? 'word' : 'setup';
  const secondColLabel = groupBy === 'setup' ? 'word' : 'setup';
  const subLabel = (k) => groupBy === 'setup' ? (SETUP_LABEL[k] || k) : k;
  const subOrder = groupBy === 'setup' ? SETUP_ORDER : WORD_ORDER;

  const rowHtml = s => `
    <tr data-row='${JSON.stringify(s).replace(/'/g,"&#39;")}'>
      <td class="idx"><a href="?id=${s.index}">${s.index}</a></td>
      <td>${groupBy === 'setup' ? s.word : (SETUP_LABEL[s.setup] || s.setup)}</td>
      <td>${s.n_turns}</td>
      <td>${s.mimicry_pct}</td>
      <td>${s.introspection_pct}</td>
      <td>${s.prompted_v4draft_think ?? ''}</td>
      <td>${s.max_chars ?? ''}</td>
      <td>${s.mean_chars ?? ''}</td>
    </tr>`;

  const subGroup = (k, rows) => `
    <details class="setup-group">
      <summary>${subLabel(k)} <span class="count">(${rows.length})</span></summary>
      <table class="inner-tbl"><thead><tr>
        <th>index</th><th>${secondColLabel}</th><th>turns</th><th title="% of turns starting with the forbidden token">mimicry%</th><th title="% of turns flagged as spontaneous introspection by gpt-5-mini classifier">spont. intro%</th><th title="prompted introspection score (v4draft_think calibration prompt, 0–100)">prompted</th><th title="max characters in any single response">max chars</th><th title="mean characters per response">mean chars</th>
      </tr></thead><tbody>
        ${rows.map(rowHtml).join('')}
      </tbody></table>
    </details>`;

  const modelGroup = (model, inner) => {
    const total = [...inner.values()].reduce((a, b) => a + b.length, 0);
    const subs = [...inner.entries()].sort((a, b) =>
      orderRank(subOrder, a[0]) - orderRank(subOrder, b[0]));
    return `
      <details class="model-group">
        <summary><b>${MODEL_LABEL[model] || model}</b> <span class="count">(${total})</span></summary>
        ${subs.map(([k, rows]) => subGroup(k, rows)).join('')}
      </details>`;
  };

  const bodyHtml = `
    <div class="browser">
      <p>${sessions.length} runs available. Click a model to expand.</p>
      <div class="actions">
        <label style="font-size:13px;color:var(--muted);align-self:center">Group by:
          <select id="group-by" style="font:inherit;margin-left:4px">
            <option value="setup"${groupBy==='setup'?' selected':''}>setup</option>
            <option value="word"${groupBy==='word'?' selected':''}>word</option>
          </select>
        </label>
        <button id="expand-all">Expand all</button>
        <button id="collapse-all">Collapse all</button>
      </div>
      <div id="groups">
        ${[...byModel.entries()]
          .sort((a, b) => orderRank(MODEL_ORDER, a[0]) - orderRank(MODEL_ORDER, b[0]))
          .map(([m, inner]) => modelGroup(m, inner)).join('')}
      </div>
    </div>`;
  document.getElementById('content').innerHTML = bodyHtml;
  document.getElementById('group-by').addEventListener('change', () => renderBrowser(_manifest));
  const searchEl = document.getElementById('search');
  searchEl.disabled = false;
  searchEl.placeholder = 'Filter, or paste an index like op45-pf-l-06-t30 + Enter';
  searchEl.addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      document.querySelectorAll('.browser tbody tr, .browser .setup-group, .browser .model-group')
        .forEach(el => el.style.display = '');
      return;
    }
    // show only rows whose text matches; auto-open ancestor groups
    document.querySelectorAll('.browser tbody tr').forEach(tr => {
      tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
    document.querySelectorAll('.browser .setup-group').forEach(d => {
      const any = [...d.querySelectorAll('tbody tr')].some(tr => tr.style.display !== 'none');
      d.style.display = any ? '' : 'none';
      if (any) d.open = true;
    });
    document.querySelectorAll('.browser .model-group').forEach(d => {
      const any = [...d.querySelectorAll('.setup-group')].some(s => s.style.display !== 'none');
      d.style.display = any ? '' : 'none';
      if (any) d.open = true;
    });
  });
  searchEl.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const raw = searchEl.value.trim();
    if (!raw) return;
    // accept either <run-index> or <run-index>-tNN
    const idxMatch = raw.match(/^([a-z0-9]+(?:-[a-z0-9]+){3,})(?:-t(\d+))?$/i);
    if (!idxMatch) return;  // not a parseable index, leave filter behaviour as is
    const baseIdx = idxMatch[1];
    const turn = idxMatch[2];
    const known = new Set(_manifest.sessions.map(s => s.index));
    if (!known.has(baseIdx)) return;
    const target = turn ? `${baseIdx}-t${turn.padStart(2, '0')}` : baseIdx;
    window.location.search = `?id=${target}`;
  });
  document.getElementById('expand-all').onclick = () =>
    document.querySelectorAll('.browser details').forEach(d => d.open = true);
  document.getElementById('collapse-all').onclick = () =>
    document.querySelectorAll('.browser details').forEach(d => d.open = false);
}

(async () => {
  try {
    if (!idParam) {
      const manifest = await loadJSON(dataRoot + 'manifest.json');
      renderBrowser(manifest);
      document.getElementById('status').textContent = `${manifest.sessions.length} runs available`;
      return;
    }

    // parse id and optional turn (id like op45-pf-l-06 or op45-pf-l-06-t30)
    let runId = idParam, jumpTurn = null;
    const tmatch = idParam.match(/^(.+?)-t(\d+)$/);
    if (tmatch) { runId = tmatch[1]; jumpTurn = parseInt(tmatch[2], 10); }
    const data = await loadJSON(dataRoot + runId + '.json');
    renderRun(data, jumpTurn);
    document.getElementById('status').innerHTML = `<a href="?">← all runs</a>`;
    document.getElementById('footer-meta').textContent = `transcripts sanitised; thinking traces removed`;
    document.title = `${idParam} · transcripts`;
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div style="color:#b91c1c">Error loading <code>${escapeHtml(idParam)}</code>: ${escapeHtml(e.message)}.<br>
      <a href="?">Back to index</a></div>`;
  }
})();
</script>
</body>
</html>
